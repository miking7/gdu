name: Release

on:
  push:
    tags:
      # Fork releases are CalVer: vYYYY.M.PATCH (e.g. v2026.7.0). The year
      # prefix keeps this from ever matching upstream's inherited v1–v5 tags,
      # so an accidental `git push --tags` can't cut bogus releases from
      # upstream-tagged commits. The historical v5.36.1-parquet.1 pattern is
      # kept so a re-push of that tag still resolves.
      - 'v20*'
      - 'v*-parquet*'

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for version/changelog
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Run tests
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          # The notes file is mandatory: writing docs/releases/<tag>.md is part
          # of cutting a release (see docs/run-books.md), and a missing file
          # fails here loudly rather than shipping auto-generated notes that
          # would describe upstream's commits after a rebase.
          args: release --clean --release-notes docs/releases/${{ github.ref_name }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
