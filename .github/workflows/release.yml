name: Release

on:
  push:
    tags:
      # Fork release tags only (e.g. v5.36.1-parquet.1). The repo carries
      # upstream's v5.x tags, so a plain 'v*' pattern would let an accidental
      # `git push --tags` cut bogus releases from upstream-tagged commits.
      - 'v*-parquet*'

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for version/changelog
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - name: Run tests
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
