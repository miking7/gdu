# GoReleaser config for this fork — publishes plain downloadable binaries for the
# common macOS + Linux platforms only (none of upstream's Docker/winget/snap/AUR
# packaging). Runs in CI on tag push: see .github/workflows/release.yml.
#
#   Validate config:  goreleaser check
#   Local dry run:    goreleaser release --snapshot --clean   (artifacts in dist/)
version: 2

project_name: gdu

builds:
  - main: ./cmd/gdu
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
      - -pgo=default.pgo
    ldflags:
      - -s -w
      - -X github.com/dundee/gdu/v5/build.Version={{ .Version }}
      - -X github.com/dundee/gdu/v5/build.Time={{ .Date }}
      - -X github.com/dundee/gdu/v5/build.User=goreleaser

archives:
  # Unversioned names keep the "latest" URLs stable across releases, e.g.
  # https://github.com/miking7/gdu/releases/latest/download/gdu_darwin_arm64.tar.gz
  - name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: checksums.txt

changelog:
  # Auto-generated "changes since the previous tag" is meaningless for a
  # rebased fork: after each upstream sync the previous release tag is not an
  # ancestor of the new history, so the computed range sweeps in every
  # upstream commit and describes the wrong project. Notes are hand-written
  # per release instead — docs/releases/<tag>.md (template in
  # docs/releases/TEMPLATE.md) — and passed by the release workflow via
  # --release-notes.
  disable: true

release:
  draft: true # review the assets on GitHub, then click Publish
  prerelease: false # CalVer tags (vYYYY.M.PATCH) are always full releases
